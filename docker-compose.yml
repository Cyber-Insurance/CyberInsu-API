version: "3.9"

services:
  backend:
    build: .
    container_name: cyber_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - cyber_network
    depends_on:
      - postgres

networks:
  cyber_network:
    external: true
    name: cyber_insurance_network
